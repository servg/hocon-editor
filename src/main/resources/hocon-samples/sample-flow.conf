input-params {

  period {
    type: "string"
    default: "202501"
    description: "Период в формате ГГГГММ"
    require: true
    constraint {
      regex: "^\\d{6}$"
    }
  }

  userEmail {
    type: "string"
    default: "user@company.com"
    description: "Email пользователя"
    require: true
  }

  amount {
    type: "integer"
    default: 5000
    description: "Сумма платежа"
  }
}

variables {

  balance {
    type: "string"
    value: ""
    description: "Баланс, полученный из Oracle"
  }

  chargeResult {
    type: "string"
    value: ""
    description: "Результат платёжного API"
  }
}

steps {

  start {
    name = "Start"
    type = START
    outputs = [
      { to = check_balance }
    ]
  }

  check_balance {
    name = "Проверка баланса в Oracle"
    type = ORACLE_PLSQL
    connection = "oracle-main"
    config {
      sql = "BEGIN pkg_billing.get_balance(:userId, :balance); END;"
      out-param = "balance"
      out-type = STRING
    }
    max-retries = 3
    retry-delay-ms = 2000
    outputs = [
      { to = sufficient_balance, condition = "balance.toLong() >= amount.toLong()" }
      { to = insufficient_balance }
    ]
  }

  sufficient_balance {
    name = "Вызов платежного API"
    type = HTTP
    config {
      method = POST
      url = "https://processing.internal/charge"
      body = "{\"userId\": \"{userId}\", \"amount\": \"{amount}\"}"
      response-var = "chargeResult"
      timeout-ms = 15000
    }
    outputs = [
      { to = send_success_email }
    ]
  }

  insufficient_balance {
    name = "Недостаточный баланс"
    type = EMAIL
    config {
      to = "{userEmail}"
      subject = "Недостаточно средств"
      body = "Ваш баланс: {balance}. Требуется: {amount}."
      from = "billing@company.com"
    }
    outputs = [
      { to = end }
    ]
  }

  send_success_email {
    name = "Успешное уведомление"
    type = EMAIL
    config {
      to = "{userEmail}"
      subject = "Операция выполнена"
      body = "Списание прошло успешно. Результат: {chargeResult}."
      from = "billing@company.com"
    }
    outputs = [
      { to = end }
    ]
  }

  end {
    name = "End"
    type = END
  }

}
